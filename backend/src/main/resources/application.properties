server.port=8080
spring.application.name=geotube-backend

# MongoDB — override via env var MONGODB_URI
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/geotube}

# YouTube Data API v3 — set YOUTUBE_API_KEY env var
youtube.api.key=AIzaSyAIS_umhy0A2wjK1tI62pZ-YIK03tzop6E
youtube.base.url=https://www.googleapis.com/youtube/v3
# Candidates per search page (YouTube max is 50)
youtube.search.results-per-page=50
# Max pages to fetch per query (50 × 3 = 150 candidates)
youtube.search.max-pages=3

# CORS — allow React dev server
cors.allowed.origins=http://localhost:3000

# Anthropic Claude API — set ANTHROPIC_API_KEY env var to enable AI features (legacy fallback)
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.url=https://api.anthropic.com

# Ollama local inference — primary AI provider (no API key needed)
ollama.base.url=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:deepseek-r1:14b}

# Logging
logging.level.com.geotube=INFO
logging.level.org.springframework.web.reactive.function.client=WARN
